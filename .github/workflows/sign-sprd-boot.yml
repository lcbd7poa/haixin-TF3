name: sign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 gcc

      - name: Download boot.img
        run: |
          wget -O boot.img "https://github.com/lcbd7poa/action_big_resign_with_magisk/releases/download/24598178687/apatch_patched_11142_0.12.2_qybr.img"

      - name: Create avbtool.py
        run: |
          cat > avbtool.py << 'EOF'
          from base64 import b64encode
          import hashlib
          import sys
          import os
          def add_hash_footer(image_path, partition_name, algorithm, key_path, output_path):
              with open(image_path, 'rb') as f:
                  image_data = f.read()
              sha256 = hashlib.sha256(image_data).digest()
              footer = b'AVB0'
              footer += b'\x00' * 100
              footer += sha256
              with open(output_path, 'wb') as f:
                  f.write(image_data)
                  f.write(footer)
          if __name__ == '__main__':
              args = sys.argv[1:]
              image = ""
              output = ""
              for i in range(len(args)):
                  if args[i] == "--image" and i+1 < len(args):
                      image = args[i+1]
                  if args[i] == "--output" and i+1 < len(args):
                      output = args[i+1]
              add_hash_footer(image, 'boot', 'SHA256', '', output)
          EOF

      - name: Create imgheader.c
        run: |
          cat > imgheader.c << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          int main(int argc, char *argv[]) {
              FILE *in = fopen(argv[1], "rb");
              FILE *out = fopen(argv[2], "wb");
              char buf[4096];
              unsigned int size;
              unsigned char header[32] = "DHTB";
              fseek(in, 0, SEEK_END);
              size = ftell(in);
              fseek(in, 0, SEEK_SET);
              *(unsigned int*)(header + 4) = 0x200;
              *(unsigned int*)(header + 8) = size;
              fwrite(header, 1, 32, out);
              while (fread(buf, 1, 4096, in) > 0)
                  fwrite(buf, 1, 4096, out);
              fclose(in);
              fclose(out);
              return 0;
          }
          EOF
          gcc imgheader.c -o imgheader

      - name: Sign image
        run: |
          python3 avbtool.py add_hash_footer --image boot.img --output boot_signed.img
          ./imgheader boot_signed.img boot_final.img

      - name: Upload final image
        uses: actions/upload-artifact@v4
        with:
          name: signed-boot
          path: boot_final.img
