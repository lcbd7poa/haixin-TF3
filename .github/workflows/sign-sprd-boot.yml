name: 展讯UMS312 正确签名工具 (Apatch/KernelSU)

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "修补好的 boot 下载链接"
        required: true
        type: string

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc wget
          pip3 install pycryptodome

      - name: 下载 avbtool + 密钥
        run: |
          wget -O avbtool.py https://ghproxy.com/https://raw.githubusercontent.com/android/platform/external_avb/master/avbtool.py
          wget -O rsa2048.pem https://ghproxy.com/https://raw.githubusercontent.com/android/platform/external_avb/master/test/data/rsa2048.pem

      - name: 下载展讯DHTB工具
        run: |
          wget -O imgheaderinsert.c https://ghproxy.com/https://raw.githubusercontent.com/affggh/sprd-tools/main/imgheaderinsert/imgheaderinsert.c
          gcc imgheaderinsert.c -o imgheaderinsert
          chmod +x imgheaderinsert

      - name: 下载boot
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"

      - name: 正确签名（展讯UMS312专用）
        run: |
          python3 avbtool.py add_hash_footer \
            --image boot.img \
            --partition_name boot \
            --algorithm SHA256_RSA2048 \
            --key rsa2048.pem \
            --output boot_signed.img

          ./imgheaderinsert boot_signed.img boot_final.img 0x200

      - name: 上传可直接刷入的镜像
        uses: actions/upload-artifact@v4
        with:
          name: boot_final
          path: boot_final.img
